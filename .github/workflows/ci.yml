# GitHub Actions CI Workflow for email-agent
#
# Runs on every push and pull request.
# Validates code quality with ruff and runs tests with pytest.
#
# See PLAN.md §12 for CI configuration details.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Disable uv's interactive mode in CI
  UV_NO_PROGRESS: "1"
  # Use pip compatibility mode for faster installs
  UV_PIP_COMPATIBLE: "1"

jobs:
  # -----------------------------------------------------------------------
  # Lint and Type Check
  # -----------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run ruff check
        run: |
          uv run ruff check email_agent/

      - name: Run ruff format check
        run: |
          uv run ruff format --check email_agent/

      - name: Run mypy type check
        run: |
          uv run mypy email_agent/

  # -----------------------------------------------------------------------
  # Test Suite
  # -----------------------------------------------------------------------
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev
          uv pip install -e . --no-build

      - name: Run pytest
        run: |
          uv run pytest tests/ --cov=email_agent --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: coverage.xml
          fail_ci_if_error: false
          flags: unittests

  # -----------------------------------------------------------------------
  # Pre-commit hooks (full validation)
  # -----------------------------------------------------------------------
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install pre-commit hooks
        run: |
          uv sync --all-extras --dev
          uv run pre-commit install

      - name: Run pre-commit hooks
        run: |
          uv run pre-commit run --all-files

  # -----------------------------------------------------------------------
  # Security Audit
  # -----------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Install safety
        run: |
          uv pip install safety

      - name: Run security audit
        run: |
          uv run safety check --stdin
        # Note: In a real project, you would run safety check against requirements
        # This is a placeholder for the security audit step
